[package]
name = "mlua-socket"
version = "0.2.7"
authors = ["David Rauschenbach <david@megalithic.llc>"]
homepage = "https://on-prem.net"
keywords = ["lua", "networking"]
categories = ["api-bindings", "network-programming"]
license = "MIT"
edition = "2024"
repository = "https://gitlab.com/megalithic-llc/mlua/mlua-socket.git"
description = "A Rust-native implementation of LuaSocket for mlua."

[features]
lua54 = ["mlua/lua54", "mlua/vendored"]
lua53 = ["mlua/lua53", "mlua/vendored"]
lua52 = ["mlua/lua52", "mlua/vendored"]
lua51 = ["mlua/lua51", "mlua/vendored"]
luajit = ["mlua/luajit", "mlua/vendored"]
luajit52 = ["mlua/luajit52", "mlua/vendored"]

default = ["lua54", "server"]
stripped = []
inline_lua = []
server = []

[dev-dependencies]
bstr = "1.12"
criterion = { version = "0.7", default-features=false, features=["cargo_bench_support"]}
rand = "0.9"
tokio = { version = "1.47", features = ["full"] }

[dependencies]
base64 = ">=0.21.0"
dns-lookup = ">=2.1"
hostname = "0.4"
mlua = ">=0.7.0"
reqwest = { version = ">=0.12", default-features = false, features = ["blocking", "http2", "rustls-tls"] }
socket2 = "0.6.0"

[[bench]]
name = "tcp_receive_benchmark"
harness = false

[lints.clippy]
unwrap_used = "deny"
